dataset: "FashionMNIST"
channels: 1
image_size: 28
patch_size: 4
num_classes: 10

depth: 12
emb_size: 768
head_num: 12
batch_size: 256
n_epochs: 300
warmup_epochs: 20
betas: '0.9,0.99'
mixup: true
longtail: true
imb_type: 'exp'
imb_factor: 0.05

lr: 3e-4
weight_decay: 0.05
drop_p: 0.1
attn_drop: 0.0
max_drop_path: 0.1
label_smoothing: 0.1
