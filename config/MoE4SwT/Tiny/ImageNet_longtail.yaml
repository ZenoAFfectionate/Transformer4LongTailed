model_name: MoE4SwT
dataset: ImageNet
num_classes: 1000
channels: 3
image_size: 224
patch_size: 16

emb_size: 192
depth: 8
head_num: 3
num_experts: 8
share_experts: 2
top_k: 2
moe_aux_weight: 1.0

batch_size: 128
n_epochs: 100
warmup_epochs: 5
betas: '0.9,0.99'
lr: 1e-4
weight_decay: 0.05
drop_p: 0.1
attn_drop: 0.0
label_smoothing: 0.1

mixup: true
longtail: true
imb_type: exp
imb_factor: 0.01
loss_type: LDAM

head_class_idx: [0, 390]
med_class_idx:  [390, 835]
tail_class_idx: [835, 1000]
