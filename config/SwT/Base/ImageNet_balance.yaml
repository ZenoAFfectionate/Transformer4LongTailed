model_name: SwT
dataset: ImageNet
num_classes: 1000
channels: 3
image_size: 224
patch_size: 4
window_size: 7

emb_size: 96
depth: 12
head_num: 3

batch_size: 128
n_epochs: 100
warmup_epochs: 5
betas: '0.9,0.99'
lr: 1e-4
weight_decay: 0.05
drop_p: 0.1
label_smoothing: 0.1

mixup: true
longtail: false

head_class_idx: [0, 390]
med_class_idx:  [390, 835]
tail_class_idx: [835, 1000]
